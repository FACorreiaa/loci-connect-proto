          oneOf:
            - $ref: '#/components/schemas/google.protobuf.Timestamp'
            - type: "null"
          title: date
          description: Optional calendar date for the day (nil for a relative "Day N" plan).
        stops:
          type: array
          items:
            $ref: '#/components/schemas/loci.trip.TripStop'
          title: stops
