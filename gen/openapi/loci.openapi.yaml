        interests:
          type: array
          items:
            type: string
            maxLength: 100
            minLength: 1
          title: interests
          maxItems: 50
        dayStartMinute:
          type:
            - integer
            - "null"
          title: day_start_minute
          maximum: 1440
          minimum: 0
          format: int32
          description: Daily active window, minutes from midnight (e.g. 540 = 09:00).
