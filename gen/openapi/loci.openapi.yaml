      title: StreamError
      additionalProperties: false
      description: |-
        StreamError is the typed error payload for STREAM_EVENT_TYPE_ERROR events.
         user_message is safe to render; internal_code is for logs/telemetry.
    loci.chat.StreamEvent:
      type: object
      allOf:
        - properties:
            message:
              type: string
              title: message
              maxLength: 4000
            timestamp:
              title: timestamp
