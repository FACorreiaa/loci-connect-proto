      required:
        - createdAt
        - updatedAt
      additionalProperties: false
      description: |-
        TripDraft is the full editable trip. `version` powers optimistic concurrency /
         merge-safe multi-device edits: SaveTrip rejects a write whose base version is
         stale.
    loci.trip.TripPace:
      type: string
      title: TripPace
      enum:
        - TRIP_PACE_UNSPECIFIED
        - TRIP_PACE_RELAXED
        - TRIP_PACE_MODERATE
        - TRIP_PACE_PACKED
      description: TripPace is how densely a day is packed.
