          title: id
          maxLength: 100
          minLength: 1
        tripId:
          type: string
          title: trip_id
          maxLength: 100
          minLength: 1
        version:
          type:
            - integer
            - string
          title: version
          minimum: 0
          format: int64
        trip:
          title: trip
          $ref: '#/components/schemas/loci.trip.TripDraft'
        createdAt:
          title: created_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
      title: TripSnapshot
      required:
        - trip
        - createdAt
      additionalProperties: false
      description: |-
        TripSnapshot is an immutable point-in-time copy of a trip, written on each
         save so a device can reconcile against a known base version.
