components:
  schemas:
    ai_poi.v1.ApiVersion:
      type: object
      properties:
        version:
          type: string
          title: version
        status:
          type: string
          title: status
      title: ApiVersion
      additionalProperties: false
    ai_poi.v1.ComponentHealth:
      type: object
      properties:
        name:
          type: string
          title: name
          maxLength: 100
          minLength: 1
        status:
          type: string
          title: status
          enum:
            - healthy
            - degraded
            - unhealthy
          description: '"healthy", "degraded", "unhealthy"'
        message:
          type: string
          title: message
          maxLength: 500
        responseTimeMs:
          type: number
          title: response_time_ms
          minimum: 0
          format: double
        metrics:
          type: object
          title: metrics
          additionalProperties:
            type: string
            title: value
            minLength: 1
      title: ComponentHealth
      additionalProperties: false
    ai_poi.v1.ComponentHealth.MetricsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: MetricsEntry
      additionalProperties: false
    ai_poi.v1.FeatureFlag:
      type: object
      properties:
        name:
          type: string
          title: name
          maxLength: 100
          minLength: 1
        enabled:
          type: boolean
          title: enabled
      title: FeatureFlag
      additionalProperties: false
    ai_poi.v1.GetFeatureFlagsRequest:
      type: object
      properties:
        userId:
          type: string
          title: user_id
          maxLength: 100
          minLength: 1
        clientVersion:
          type: string
          title: client_version
          maxLength: 50
          minLength: 1
        platform:
          type: string
          title: platform
          enum:
            - web
            - ios
            - android
          description: '"web", "ios", "android"'
        userAttributes:
          type: object
          title: user_attributes
          additionalProperties:
            type: string
            title: value
            minLength: 1
      title: GetFeatureFlagsRequest
      additionalProperties: false
      description: Feature flags
    ai_poi.v1.GetFeatureFlagsRequest.UserAttributesEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: UserAttributesEntry
      additionalProperties: false
    ai_poi.v1.GetFeatureFlagsResponse:
      type: object
      properties:
        flags:
          type: array
          items:
            $ref: '#/components/schemas/ai_poi.v1.FeatureFlag'
          title: flags
        experiments:
          type: object
          title: experiments
          additionalProperties:
            type: string
            title: value
            minLength: 1
          description: A/B test assignments
      title: GetFeatureFlagsResponse
      additionalProperties: false
    ai_poi.v1.GetFeatureFlagsResponse.ExperimentsEntry:
