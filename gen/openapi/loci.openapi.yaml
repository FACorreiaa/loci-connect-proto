tags:
  - name: ai_poi.v1.AiPoiService
    description: |-
      Main AI POI API Gateway Service
       This service can act as a unified entry point to all sub-services
  - name: loci.apikey.ApiKeyService
    description: |-
      ApiKeyService manages long-lived API keys for programmatic access
       (MCP clients, integrations). Keys authenticate as the owning user.
  - name: loci.auth.AuthService
    description: AuthService defines authentication-related RPCs
  - name: loci.city.CityService
    description: CityService defines city-related RPCs
  - name: loci.poi.POIService
    description: POIService defines POI-related RPCs
  - name: loci.interest.InterestService
    description: InterestService defines interest-related RPCs
  - name: loci.profile.ProfileService
    description: ProfileService defines profile-related RPCs
