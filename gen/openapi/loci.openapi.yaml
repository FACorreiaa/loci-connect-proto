              oneOf:
                - $ref: '#/components/schemas/loci.chat.NavigationData'
                - type: "null"
              title: navigation
            eventType:
              title: event_type
              $ref: '#/components/schemas/loci.chat.StreamEventType'
            requestId:
              type:
                - string
                - "null"
              title: request_id
              maxLength: 100
              minLength: 1
              description: request_id echoes ChatRequest.request_id for client-side correlation.
        - oneOf:
            - properties:
                activities:
                  title: activities
                  $ref: '#/components/schemas/loci.chat.ActivitiesPayload'
              title: activities
              required:
                - activities
            - properties:
                cityData:
                  title: city_data
                  $ref: '#/components/schemas/loci.chat.CityDataPayload'
              title: city_data
              required:
                - cityData
            - properties:
                complete:
                  title: complete
                  $ref: '#/components/schemas/loci.chat.CompletePayload'
              title: complete
              required:
                - complete
            - properties:
                error:
                  title: error
                  $ref: '#/components/schemas/loci.chat.StreamError'
              title: error
              required:
                - error
            - properties:
                generalPois:
                  title: general_pois
                  $ref: '#/components/schemas/loci.chat.GeneralPoisPayload'
              title: general_pois
              required:
                - generalPois
            - properties:
                hotels:
                  title: hotels
                  $ref: '#/components/schemas/loci.chat.HotelsPayload'
              title: hotels
              required:
                - hotels
            - properties:
                itinerary:
                  title: itinerary
                  $ref: '#/components/schemas/loci.chat.ItineraryPayload'
              title: itinerary
              required:
                - itinerary
            - properties:
                partial:
                  title: partial
                  $ref: '#/components/schemas/loci.chat.TokenPayload'
              title: partial
              required:
                - partial
            - properties:
                progress:
                  title: progress
                  $ref: '#/components/schemas/loci.chat.ProgressPayload'
              title: progress
              required:
                - progress
            - properties:
                restaurants:
                  title: restaurants
                  $ref: '#/components/schemas/loci.chat.RestaurantsPayload'
              title: restaurants
              required:
                - restaurants
            - properties:
                start:
                  title: start
                  $ref: '#/components/schemas/loci.chat.StartPayload'
              title: start
              required:
                - start
            - properties:
                token:
                  title: token
                  $ref: '#/components/schemas/loci.chat.TokenPayload'
              title: token
              required:
                - token
      title: StreamEvent
      required:
        - timestamp
      additionalProperties: false
      description: |-
        StreamEvent represents a streaming event. The old free-form `type` string
         (field 1), opaque `data` bytes (field 3), and `error` string (field 4) were
         replaced by the typed `event_type` enum + `payload` oneof below.
    loci.chat.StreamEventType:
      type: string
      title: StreamEventType
      enum:
        - STREAM_EVENT_TYPE_UNSPECIFIED
        - STREAM_EVENT_TYPE_START
        - STREAM_EVENT_TYPE_TOKEN
        - STREAM_EVENT_TYPE_PARTIAL
        - STREAM_EVENT_TYPE_CITY_DATA
        - STREAM_EVENT_TYPE_ITINERARY
        - STREAM_EVENT_TYPE_GENERAL_POIS
        - STREAM_EVENT_TYPE_HOTELS
        - STREAM_EVENT_TYPE_RESTAURANTS
        - STREAM_EVENT_TYPE_ACTIVITIES
        - STREAM_EVENT_TYPE_PROGRESS
        - STREAM_EVENT_TYPE_ERROR
        - STREAM_EVENT_TYPE_COMPLETE
      description: |-
        StreamEventType is the typed discriminator for a StreamEvent. It replaces the
         old free-form string `type` field. The concrete payload (when present) is
         carried in StreamEvent.payload and its oneof case matches this enum.
    loci.chat.TokenPayload:
      type: object
      properties:
        text:
          type: string
          title: text
          maxLength: 16000
        part:
          type:
            - integer
            - "null"
          title: part
          minimum: 0
          format: int32
      title: TokenPayload
      additionalProperties: false
      description: |-
        TokenPayload carries an incremental text token (STREAM_EVENT_TYPE_TOKEN) or an
         accumulated partial snapshot (STREAM_EVENT_TYPE_PARTIAL). `part` indexes the
         producing worker so consumers can accumulate per-part.
