syntax = "proto3";

package loci.compare.v1;

option go_package = "github.com/FACorreiaa/loci-connect-proto/gen/go/loci/compare/v1;comparev1";

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";
import "loci/localcontext/localcontext.proto";
import "loci/poi/poi.proto";

// CompareRecommendation is the server's pick among candidates (or both).
enum CompareRecommendation {
  COMPARE_RECOMMENDATION_UNSPECIFIED = 0;
  COMPARE_RECOMMENDATION_FIRST = 1;
  COMPARE_RECOMMENDATION_SECOND = 2;
  COMPARE_RECOMMENDATION_BOTH = 3;
}

// BookingLink is a partner deeplink (Booking.com, TheFork, etc.).
message BookingLink {
  string provider = 1 [(buf.validate.field).string = {min_len: 1, max_len: 100}];
  string label = 2 [(buf.validate.field).string = {min_len: 1, max_len: 200}];
  string url = 3 [(buf.validate.field).string = {min_len: 1, max_len: 2048, uri: true}];
}

// TransportLink is a ride/transit deeplink or estimate.
message TransportLink {
  string mode = 1 [(buf.validate.field).string = {min_len: 1, max_len: 50}];
  string summary = 2 [(buf.validate.field).string = {max_len: 300}];
  int32 duration_mins = 3 [(buf.validate.field).int32 = {gte: 0}];
  optional string url = 4 [(buf.validate.field).string = {max_len: 2048, uri: true}];
}

// CityCompareColumn is one candidate city's side-by-side summary.
message CityCompareColumn {
  string city_name = 1 [(buf.validate.field).string = {min_len: 1, max_len: 200}];
  string city_id = 2 [(buf.validate.field).string = {max_len: 100}];
  string country = 3 [(buf.validate.field).string = {max_len: 200}];
  double center_lat = 4;
  double center_lon = 5;
  double distance_km = 6 [(buf.validate.field).double = {gte: 0}];
  int32 travel_mins = 7 [(buf.validate.field).int32 = {gte: 0}];
  repeated loci.localcontext.WeatherDay weather = 8;
  bool weather_is_estimated = 9;
  repeated loci.poi.POIDetailedInfo top_pois = 10;
  repeated string pros = 11;
  repeated string cons = 12;
  repeated BookingLink booking_options = 13;
  repeated TransportLink transport_options = 14;
  string stay_snippet = 15 [(buf.validate.field).string = {max_len: 500}];
  string eat_snippet = 16 [(buf.validate.field).string = {max_len: 500}];
}

// DualCityOption describes whether a two-city weekend is feasible.
message DualCityOption {
  bool feasible = 1;
  string outline = 2 [(buf.validate.field).string = {max_len: 2000}];
  int32 total_travel_mins = 3 [(buf.validate.field).int32 = {gte: 0}];
  bool pro_only = 4;
}

// CompareWeekendRequest compares 2–3 candidate cities for a short trip window.
message CompareWeekendRequest {
  optional string origin_city = 1 [(buf.validate.field).string = {max_len: 200}];
  optional double origin_lat = 2 [(buf.validate.field).double = {gte: -90, lte: 90}];
  optional double origin_lon = 3 [(buf.validate.field).double = {gte: -180, lte: 180}];
  repeated string candidate_city_names = 4 [(buf.validate.field).repeated = {
    min_items: 2,
    max_items: 3,
    items: {string: {min_len: 1, max_len: 200}}
  }];
  google.protobuf.Timestamp start_date = 5;
  google.protobuf.Timestamp end_date = 6;
  optional string profile_id = 7 [(buf.validate.field).string = {max_len: 100}];
}

// CompareWeekendResponse holds columns plus an optional dual-city outline.
message CompareWeekendResponse {
  string origin_city = 1;
  double origin_lat = 2;
  double origin_lon = 3;
  repeated CityCompareColumn columns = 4;
  DualCityOption dual_city_option = 5;
  CompareRecommendation recommendation = 6;
  string recommendation_reason = 7 [(buf.validate.field).string = {max_len: 1000}];
}

// CompareService compares weekend destinations side-by-side.
service CompareService {
  rpc CompareWeekend(CompareWeekendRequest) returns (CompareWeekendResponse);
}
